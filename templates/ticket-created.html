<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1f2937; margin: 0; padding: 0; background: #f3f4f6; }
    .container { max-width: 560px; margin: 24px auto; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e5e7eb; }
    .header { background: #4F46E5; color: white; padding: 24px; text-align: center; }
    .header h1 { margin: 0; font-size: 20px; }
    .body { padding: 24px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 13px; font-weight: 500; }
    .badge-open { background: #dbeafe; color: #1d4ed8; }
    .meta { margin: 16px 0; padding: 16px; background: #f9fafb; border-radius: 8px; }
    .meta-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
    .meta-label { color: #6b7280; }
    .btn { display: inline-block; padding: 10px 24px; background: #4F46E5; color: white; text-decoration: none; border-radius: 8px; font-weight: 500; font-size: 14px; }
    .footer { padding: 16px 24px; text-align: center; font-size: 12px; color: #9ca3af; border-top: 1px solid #e5e7eb; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Ticket erstellt</h1>
    </div>
    <div class="body">
      <p>Ihr Ticket wurde erfolgreich erstellt.</p>
      <h2 style="font-size:18px;margin:16px 0 8px">{{title}}</h2>
      <span class="badge badge-open">Offen</span>
      <div class="meta">
        <div class="meta-row"><span class="meta-label">Ticket-Nr.:</span><span><strong>{{ticket_number}}</strong></span></div>
        <div class="meta-row"><span class="meta-label">Priorität:</span><span>{{priority}}</span></div>
      </div>
      <p style="text-align:center;margin-top:24px">
        <a href="{{app_url}}/#/tickets" class="btn">Ticket ansehen</a>
      </p>
    </div>
    <div class="footer">IT-Helpdesk — Automatische Benachrichtigung</div>
  </div>
</body>
</html>
